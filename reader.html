<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🕇 Біблія говорить</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --header-bg: #f8f8f8;
            --border-color: #ddd;
            --text-color: #1a1a1a;
            --btn-bg: #ececec;
            --line-height: 1.3;
            --verse-spacing: 2px;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: var(--bg-color);
            margin: 0;
            color: var(--text-color);
            line-height: var(--line-height);
        /* Додаємо фон */
    background-image: url('bg.jpg'); /* Вкажіть назву свого файлу */
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    background-repeat: no-repeat;
    
    /* Колір фону залишаємо як запасний */
    background-color: var(--bg-color);
    -webkit-tap-highlight-color: transparent;
}

/* Додаємо оверлей (напівпрозорий шар), щоб текст на фоні картинки читався чітко */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(255, 255, 255, 0.95); /* Білий шар з прозорістю 70% */
    z-index: -1;
        }

        /* ХЕДЕР — ПОВНА СИНХРОНІЗАЦІЯ З INDEX.HTML */
        .header-wrapper {
            position: sticky;
            top: 0;
            background: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            height: 57px;
            display: flex;
            justify-content: center;
        }

        .ref-header-container {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 900px; /* Суворо як в index */
            padding: 0 7px;
            height: 100%;
            box-sizing: border-box;
            justify-content: space-between; /* Розносить елементи по краях */
        }

        .nav-btn {
            width: 40px;
            height: 40px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: var(--btn-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .nav-btn.arrow { font-size: 28px; }
        .nav-btn.search-icon { font-size: 22px; }

        #langBtn {
            font-family: Arial, sans-serif !important;
            font-size: 19px;
            text-transform: uppercase;
        }

        .ref-header {
            flex: 1;
            font-size: 18px;
            text-transform: uppercase;
            font-weight: 600;
            text-align: center;
            font-family: Arial, sans-serif;
            /* Щоб текст не зміщувався, якщо він занадто довгий */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .nav-group { 
            display: flex; 
            gap: 8px; 
            align-items: center;
            flex-shrink: 0; 
        }

        /* СТИЛІ КОНТЕНТУ */
        .book-container { 
            width: 100%;
            max-width: 920px; /* СИНХРОНІЗОВАНО З MAIN-CONTAINER */
            margin: 0 auto; 
            padding: 0 20px; 
            box-sizing: border-box;
        }

        #reader-layout {
            padding-top: 20px; 
        }
        
/* СТИЛІ ВІРШІВ — ОБ'ЄДНАНО ТА ВИПРАВЛЕНО */
        .verse-item { 
           margin-bottom: 2px;
            font-size: 22px; 
            text-align: justify; 
            line-height: var(--line-height);
            
            /* Відступи для комфортного натискання та візуального простору */
            /* padding: 2px 4px; */
            border-radius: 4px;
            display: block;   
            
            /* Анімація підсвічування при затисканні */
            transition: background-color 0.6s ease;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .verse-num { 
            font-size: 0.6em; 
            font-weight: bold; 
            margin-right: 8px; 
            opacity: 0.5; 
            display: inline-block;
            vertical-align: baseline;
        }

        /* Стан, коли ми затиснули палець (Long Press) */
        .verse-item.pressing {
            background-color: rgba(255, 215, 0, 0.3) !important;
            transition: background-color 0.6s ease; 
        }
        
        /* Стан після спрацювання (спалах) */
        .verse-item.shared-flash {
            background-color: rgba(255, 215, 0, 0.6) !important;
            transition: background-color 0.1s;
        }

        /* ПІДСВІЧУВАННЯ (для знайдених слів або цільового вірша) */
        .highlight { 
            background-color: #FFFACD;
            border-radius: 4px; 
        }
        
        /* АДАПТАЦІЯ ДЛЯ МОБІЛЬНИХ ПРИСТРОЇВ */
        @media (max-width: 768px) {
            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            }
            .verse-item {
                font-size: 19px; 
                line-height: 1.2; 
                margin-bottom: var(--verse-spacing);
            }
            .ref-header { font-size: 15px; }
        }
    </style>
</head>
<body>
    <div class="header-wrapper">
        <div class="ref-header-container">
            <div class="nav-group">
                <button class="nav-btn arrow" id="prevBtn">◄</button>
                <button onclick="clearLastRead()" class="nav-btn search-icon">🔍</button>
                    <script>
                    function clearLastRead() {
                        localStorage.removeItem('lastBibleRef');
                        window.location.href = 'index.html?fromSearch=true';
                    }
                    </script>
            </div>
            <div class="ref-header" id="refHeader"></div>
            <div class="nav-group">
                <button id="langBtn" class="nav-btn">UA</button>
                <button class="nav-btn arrow" id="nextBtn">►</button>
            </div>
        </div>
    </div>
    <div class="book-container">
        <div id="reader-layout"></div>
    </div>
    <script src="reader.js"></script>
</body>
</html>
